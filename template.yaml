AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BER Intake — client intake backend (precursor to BER_APP).

Parameters:
  # NOTE: secrets (bot token, webhook secrets, API keys, OAuth client secret /
  # refresh token, Turnstile/partner/surveyor keys) are NOT CloudFormation
  # parameters — they live in SSM Parameter Store as SecureStrings under
  # /ber-intake/ and are loaded at runtime by shared/secrets.ts. deploy.py
  # writes them there. Only non-secret config lives here.
  AllowedChatId:
    Type: String
    Default: ""
    Description: Your Telegram chat id. Leave blank on first deploy, then /start the bot to learn it and redeploy with it set.
  PublicSiteUrl:
    Type: String
    Default: https://cannygreen.com
    Description: Base URL the client-facing quote link is built from.
  QuoteFromEmail:
    Type: String
    Default: test@cannygreen.com
    Description: Verified SES From address for client quote emails (must be @cannygreen.com).
  QuoteFromName:
    Type: String
    Default: Anish Raghavan
    Description: Friendly From display name shown in the client's inbox (e.g. "Anish Raghavan").
  OwnerEmail:
    Type: String
    Default: anish@cannygreen.com
    Description: Where owner notifications (new booking, signed LoE) with client details + invoice are sent.
  TestEmailOverride:
    Type: String
    Default: ""
    Description: For testing — redirect ALL outgoing emails to this address. Leave blank in production.
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth client id (from the website's credentials.json).
  GoogleCalendarId:
    Type: String
    Default: ""
    Description: Calendar id holding the "Slot Available" events.
  QbClientId:
    Type: String
    Default: ""
    Description: QuickBooks (Intuit) OAuth client id.
  QbEnv:
    Type: String
    Default: sandbox
    AllowedValues: [sandbox, production]
    Description: QuickBooks environment — sandbox while building, production for the real account.
  QbTaxCodeId:
    Type: String
    Default: ""
    Description: QuickBooks TaxCode id for the BER survey line (standard/23% rate). Blank = auto-pick a zero/exempt code.
  QbOutlayTaxCodeId:
    Type: String
    Default: ""
    Description: QuickBooks TaxCode id for the SEAI publishing-fee outlay line (0% / No VAT). Blank = auto-pick a zero/exempt code.
  QbTaxRate:
    Type: String
    Default: "23"
    Description: Standard VAT rate (percent) applied to the BER survey line; used to derive the net from the VAT-inclusive quoted price.
  SignWellTemplateId:
    Type: String
    Default: ""
    Description: SignWell template id for the Letter of Engagement.
  SignWellPlaceholder:
    Type: String
    Default: Client
    Description: The signer placeholder name in the SignWell template.
  SignWellTestMode:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: SignWell test mode — true while building (no billing, no real emails).
  SolarPartnerName:
    Type: String
    Default: ""
    Description: Solar partner company name — /newsolar jobs are invoiced to this company instead of the client (secrets/solar.env).
  SolarPartnerAddress:
    Type: String
    Default: ""
    Description: Solar partner billing address, shown on their QuickBooks invoices.
  SolarPartnerEmail:
    Type: String
    Default: ""
    Description: Where the solar partner's invoices are emailed. Blank = no partner email is sent (the owner copy still carries the invoice).
  SolarPricePrimary:
    Type: String
    Default: ""
    Description: Agreed solar-partner prices (€, EX VAT — VAT and the SEAI fee are added on the invoice) for the primary zone, "apartment/small-house/large-house" (e.g. 250/270/300). Solar invoices can't be generated while the table is blank.
  SolarPriceSecondary:
    Type: String
    Default: ""
    Description: Agreed solar-partner prices for the secondary zone, "apartment/small-house/large-house".
  SolarPriceTertiary:
    Type: String
    Default: ""
    Description: Agreed solar-partner prices for the tertiary zone, "apartment/small-house/large-house".
  SolarPriceOutside:
    Type: String
    Default: ""
    Description: Agreed flat solar-partner price (€, EX VAT) outside the service zones.
  SolarDiscountAmount:
    Type: String
    Default: ""
    Description: Discount (€, ex VAT) off each solar-partner invoice while the agreed quota lasts. Blank = no discount.
  SolarDiscountTotal:
    Type: String
    Default: ""
    Description: How many solar-partner invoices the discount covers in total (e.g. 15).
  SolarDiscountAlreadyUsed:
    Type: String
    Default: "0"
    Description: Discounts already given before the DynamoDB counter existed — seeds the counter on first use only.

Globals:
  HttpApi:
    # Basic abuse/cost backstop across the whole API.
    DefaultRouteSettings:
      ThrottlingBurstLimit: 40
      ThrottlingRateLimit: 20
    CorsConfiguration:
      AllowOrigins:
        - "https://cannygreen.com"
        - "https://www.cannygreen.com"
        - "http://localhost:3000"
        - "https://d1ze07dqk0doqs.cloudfront.net"
      AllowHeaders:
        - content-type
      AllowMethods:
        - GET
        - POST
        - OPTIONS
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 15
    Environment:
      Variables:
        JOBS_TABLE: !Ref JobsTable
        BOT_STATE_TABLE: !Ref BotStateTable
        HOLDS_TABLE: !Ref HoldsTable
        RATE_LIMIT_TABLE: !Ref RateLimitTable
        GEOCODE_CACHE_TABLE: !Ref GeocodeCacheTable
        GEOCODE_DAILY_LIMIT: "50"
        # Secrets live in SSM Parameter Store under this prefix and are loaded
        # into the environment at runtime by shared/secrets.ts (hydrateSecrets).
        # They are deliberately NOT passed as Lambda env vars / CFN params, so
        # they never appear in the function config or the stack.
        SECRETS_PREFIX: /ber-intake/
        ALLOWED_CHAT_ID: !Ref AllowedChatId
        PUBLIC_SITE_URL: !Ref PublicSiteUrl
        QUOTE_FROM_EMAIL: !Ref QuoteFromEmail
        QUOTE_FROM_NAME: !Ref QuoteFromName
        OWNER_EMAIL: !Ref OwnerEmail
        TEST_EMAIL_OVERRIDE: !Ref TestEmailOverride
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        GOOGLE_CALENDAR_ID: !Ref GoogleCalendarId
        QB_CLIENT_ID: !Ref QbClientId
        QB_ENV: !Ref QbEnv
        QB_AUTH_TABLE: !Ref QbAuthTable
        QB_TAX_CODE_ID: !Ref QbTaxCodeId
        QB_OUTLAY_TAX_CODE_ID: !Ref QbOutlayTaxCodeId
        QB_TAX_RATE: !Ref QbTaxRate
        SIGNWELL_TEMPLATE_ID: !Ref SignWellTemplateId
        SIGNWELL_PLACEHOLDER: !Ref SignWellPlaceholder
        SIGNWELL_TEST_MODE: !Ref SignWellTestMode
        SOLAR_PARTNER_NAME: !Ref SolarPartnerName
        SOLAR_PARTNER_ADDRESS: !Ref SolarPartnerAddress
        SOLAR_PARTNER_EMAIL: !Ref SolarPartnerEmail
        SOLAR_PRICE_PRIMARY: !Ref SolarPricePrimary
        SOLAR_PRICE_SECONDARY: !Ref SolarPriceSecondary
        SOLAR_PRICE_TERTIARY: !Ref SolarPriceTertiary
        SOLAR_PRICE_OUTSIDE: !Ref SolarPriceOutside
        SOLAR_DISCOUNT_AMOUNT: !Ref SolarDiscountAmount
        SOLAR_DISCOUNT_TOTAL: !Ref SolarDiscountTotal
        SOLAR_DISCOUNT_ALREADY_USED: !Ref SolarDiscountAlreadyUsed
        ARTIFACTS_BUCKET: !Ref BerArtifactsBucket
        BUG_REPORTS_TABLE: !Ref BugReportsTable

Resources:
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: jobId, AttributeType: S }
        - { AttributeName: token, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: jobId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: token-index
          KeySchema:
            - { AttributeName: token, KeyType: HASH }
          Projection: { ProjectionType: ALL }
        - IndexName: status-index
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # Bug reports uploaded by the BER_APP tablet (audio + JSON state dump +
  # metadata). Queried by status (open/fixed) via status-index for the at-home
  # triage tool.
  BugReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: bugReportId, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: bugReportId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  BotStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: chatId, AttributeType: S }
      KeySchema:
        - { AttributeName: chatId, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  HoldsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: eventId, AttributeType: S }
      KeySchema:
        - { AttributeName: eventId, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  QbAuthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: id, AttributeType: S }
      KeySchema:
        - { AttributeName: id, KeyType: HASH }

  # Per-IP rate-limit counters (one item per ip+window, TTL'd).
  RateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: id, AttributeType: S }
      KeySchema:
        - { AttributeName: id, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # Geocode cache (eircode -> zone) + the per-day geocode budget counter, TTL'd.
  GeocodeCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: id, AttributeType: S }
      KeySchema:
        - { AttributeName: id, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # Per-job BER assets: satellite.jpg (written at intake), and data.json +
  # photos/* (pushed by the tablet on completion). Private; the tablet only ever
  # reaches it through short-lived presigned URLs.
  BerArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }

  CreateJobFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/createJob.ts]
    Properties:
      Handler: src/handlers/createJob.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: /jobs, Method: POST }

  ZoneFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/zoneLookup.ts]
    Properties:
      Handler: src/handlers/zoneLookup.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
        - DynamoDBCrudPolicy: { TableName: !Ref GeocodeCacheTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /zone, Method: GET }

  # Public price table (shared/pricing.ts) — the website renders pricing from
  # this, with its bundled snapshot as fallback. No secrets, no DB.
  PricingFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/getPricing.ts]
    Properties:
      Handler: src/handlers/getPricing.handler
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /pricing, Method: GET }

  GetJobFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/getJob.ts]
    Properties:
      Handler: src/handlers/getJob.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}", Method: GET }

  SaveQuoteFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/saveQuote.ts]
    Properties:
      Handler: src/handlers/saveQuote.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/quote", Method: POST }

  SaveDetailsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/saveDetails.ts]
    Properties:
      Handler: src/handlers/saveDetails.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        # The prebooked→booked path sends the owner new-booking email with the
        # invoice attached — minting it needs the QuickBooks auth table.
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
        # Refreshing the assessor seed with the client's address re-uploads the
        # satellite image to the artifacts bucket.
        - S3CrudPolicy: { BucketName: !Ref BerArtifactsBucket }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/details", Method: POST }

  SlotsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/slots.ts]
    Properties:
      Handler: src/handlers/slots.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBReadPolicy: { TableName: !Ref JobsTable }
        - DynamoDBReadPolicy: { TableName: !Ref HoldsTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/slots", Method: GET }

  HoldFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/hold.ts]
    Properties:
      Handler: src/handlers/hold.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref HoldsTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/hold", Method: POST }

  BookFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/book.ts]
    Properties:
      Handler: src/handlers/book.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref HoldsTable }
        - S3CrudPolicy: { BucketName: !Ref BerArtifactsBucket }
        # Booking sends the owner new-booking email (invoice attached) and, for
        # solar-partner jobs, the partner invoice email — both need SES plus
        # QuickBooks auth to mint/fetch the invoice.
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/book", Method: POST }

  # Deferred funnel emails: quote (1h after quoting, if not booked) and the
  # letter-of-engagement nudge (10min after booking, if not signed). Runs often
  # so the 10-minute window stays tight.
  SweepDeferredEmailsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/sweepDeferredEmails.ts]
    Properties:
      Handler: src/handlers/sweepDeferredEmails.handler
      Timeout: 60
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(2 minutes)

  ConfirmFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/confirmBooking.ts]
    Properties:
      Handler: src/handlers/confirmBooking.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/confirm", Method: POST }

  LoeFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/loe.ts]
    Properties:
      Handler: src/handlers/loe.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/loe", Method: POST }

  SignWellWebhookFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/signwellWebhook.ts]
    Properties:
      Handler: src/handlers/signwellWebhook.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: /signwell/webhook, Method: POST }

  GenerateInvoiceFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/generateInvoice.ts]
    Properties:
      Handler: src/handlers/generateInvoice.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/invoice", Method: POST }

  InvoicePdfFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/invoicePdf.ts]
    Properties:
      Handler: src/handlers/invoicePdf.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/invoice.pdf", Method: GET }

  QbConnectFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbConnect.ts]
    Properties:
      Handler: src/handlers/qbConnect.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/connect, Method: GET }

  QbCallbackFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbCallback.ts]
    Properties:
      Handler: src/handlers/qbCallback.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/callback, Method: GET }

  QbStatusFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbStatus.ts]
    Properties:
      Handler: src/handlers/qbStatus.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/status, Method: GET }

  QbTaxCodesFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbTaxCodes.ts]
    Properties:
      Handler: src/handlers/qbTaxCodes.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/taxcodes, Method: GET }

  TelegramWebhookFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/telegramWebhook.ts]
    Properties:
      Handler: src/handlers/telegramWebhook.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref BotStateTable }
        # Pre-agreed bookings (/newclient, /newsolar_arranged) seed the tablet
        # data at creation, including the satellite image upload.
        - S3CrudPolicy: { BucketName: !Ref BerArtifactsBucket }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: /telegram/webhook, Method: POST }

  # ---- Surveyor (BER_APP tablet) endpoints -------------------------------
  SurveyorListJobsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/surveyorListJobs.ts]
    Properties:
      Handler: src/handlers/surveyorListJobs.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBReadPolicy: { TableName: !Ref JobsTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /surveyor/jobs, Method: GET }

  SurveyorGetJobFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/surveyorGetJob.ts]
    Properties:
      Handler: src/handlers/surveyorGetJob.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: ber-intake/*
        - DynamoDBReadPolicy: { TableName: !Ref JobsTable }
        - S3ReadPolicy: { BucketName: !Ref BerArtifactsBucket }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/surveyor/jobs/{jobId}", Method: GET }

  SurveyorCreateJobFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/surveyorCreateJob.ts]
    Properties:
