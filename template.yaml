Outputs:
  ApiUrl:
    Description: Base URL of the HTTP API.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TelegramWebhookUrl:
    Description: Set this as the bot webhook (see README).
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/telegram/webhook"
  BerArtifactsBucketName:
    Description: S3 bucket holding per-job BER assets (satellite image, data.json, photos).
    Value: !Ref BerArtifactsBucket
  BugReportsTableName:
    Description: DynamoDB table holding tablet-uploaded bug reports.
    Value: !Ref BugReportsTable
