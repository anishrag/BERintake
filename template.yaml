AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BER Intake — client intake backend (precursor to BER_APP).

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Bot token from @BotFather.
  AllowedChatId:
    Type: String
    Default: ""
    Description: Your Telegram chat id. Leave blank on first deploy, then /start the bot to learn it and redeploy with it set.
  PartnerAccessKey:
    Type: String
    NoEcho: true
    Description: Shared secret the partner web form must send to create a job.
  PublicSiteUrl:
    Type: String
    Default: https://cannygreen.ie
    Description: Base URL the client-facing quote link is built from.
  GoogleMapsApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google Maps Geocoding API key, used to map an eircode to a service zone for pricing. Same key as the website's REACT_APP_GOOGLE_MAPS_API_KEY.
  QuoteFromEmail:
    Type: String
    Default: test@cannygreen.com
    Description: Verified SES From address for client quote emails (must be @cannygreen.com).
  TestEmailOverride:
    Type: String
    Default: ""
    Description: For testing — redirect ALL outgoing emails to this address. Leave blank in production.
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth client id (from the website's credentials.json).
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google OAuth client secret.
  GoogleRefreshToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google OAuth refresh token (from the website's token.json).
  GoogleCalendarId:
    Type: String
    Default: ""
    Description: Calendar id holding the "Slot Available" events.
  QbClientId:
    Type: String
    Default: ""
    Description: QuickBooks (Intuit) OAuth client id.
  QbClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: QuickBooks OAuth client secret.
  QbEnv:
    Type: String
    Default: sandbox
    AllowedValues: [sandbox, production]
    Description: QuickBooks environment — sandbox while building, production for the real account.
  QbTaxCodeId:
    Type: String
    Default: ""
    Description: Optional QuickBooks TaxCode id for invoice lines. Blank = auto-pick a zero/exempt code.

Globals:
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "https://cannygreen.ie"
        - "https://www.cannygreen.ie"
        - "http://localhost:3000"
        - "https://d1ze07dqk0doqs.cloudfront.net"
      AllowHeaders:
        - content-type
      AllowMethods:
        - GET
        - POST
        - OPTIONS
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 15
    Environment:
      Variables:
        JOBS_TABLE: !Ref JobsTable
        BOT_STATE_TABLE: !Ref BotStateTable
        HOLDS_TABLE: !Ref HoldsTable
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        ALLOWED_CHAT_ID: !Ref AllowedChatId
        PARTNER_ACCESS_KEY: !Ref PartnerAccessKey
        PUBLIC_SITE_URL: !Ref PublicSiteUrl
        GOOGLE_MAPS_API_KEY: !Ref GoogleMapsApiKey
        QUOTE_FROM_EMAIL: !Ref QuoteFromEmail
        TEST_EMAIL_OVERRIDE: !Ref TestEmailOverride
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
        GOOGLE_REFRESH_TOKEN: !Ref GoogleRefreshToken
        GOOGLE_CALENDAR_ID: !Ref GoogleCalendarId
        QB_CLIENT_ID: !Ref QbClientId
        QB_CLIENT_SECRET: !Ref QbClientSecret
        QB_ENV: !Ref QbEnv
        QB_AUTH_TABLE: !Ref QbAuthTable
        QB_TAX_CODE_ID: !Ref QbTaxCodeId

Resources:
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: jobId, AttributeType: S }
        - { AttributeName: token, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: jobId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: token-index
          KeySchema:
            - { AttributeName: token, KeyType: HASH }
          Projection: { ProjectionType: ALL }
        - IndexName: status-index
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  BotStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: chatId, AttributeType: S }
      KeySchema:
        - { AttributeName: chatId, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  HoldsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: eventId, AttributeType: S }
      KeySchema:
        - { AttributeName: eventId, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  QbAuthTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: id, AttributeType: S }
      KeySchema:
        - { AttributeName: id, KeyType: HASH }

  CreateJobFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/createJob.ts]
    Properties:
      Handler: src/handlers/createJob.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: /jobs, Method: POST }

  GetJobFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/getJob.ts]
    Properties:
      Handler: src/handlers/getJob.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}", Method: GET }

  SaveQuoteFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/saveQuote.ts]
    Properties:
      Handler: src/handlers/saveQuote.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/quote", Method: POST }

  EmailQuoteFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/emailQuote.ts]
    Properties:
      Handler: src/handlers/emailQuote.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/email-quote", Method: POST }

  SaveDetailsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/saveDetails.ts]
    Properties:
      Handler: src/handlers/saveDetails.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/details", Method: POST }

  SlotsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/slots.ts]
    Properties:
      Handler: src/handlers/slots.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref JobsTable }
        - DynamoDBReadPolicy: { TableName: !Ref HoldsTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/slots", Method: GET }

  HoldFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/hold.ts]
    Properties:
      Handler: src/handlers/hold.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref HoldsTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/hold", Method: POST }

  BookFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/book.ts]
    Properties:
      Handler: src/handlers/book.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref HoldsTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/book", Method: POST }

  GenerateInvoiceFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/generateInvoice.ts]
    Properties:
      Handler: src/handlers/generateInvoice.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/invoice", Method: POST }

  InvoicePdfFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/invoicePdf.ts]
    Properties:
      Handler: src/handlers/invoicePdf.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: "/jobs/{token}/invoice.pdf", Method: GET }

  QbConnectFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbConnect.ts]
    Properties:
      Handler: src/handlers/qbConnect.handler
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/connect, Method: GET }

  QbCallbackFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbCallback.ts]
    Properties:
      Handler: src/handlers/qbCallback.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/callback, Method: GET }

  QbStatusFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/qbStatus.ts]
    Properties:
      Handler: src/handlers/qbStatus.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref QbAuthTable }
      Events:
        Get:
          Type: HttpApi
          Properties: { Path: /qb/status, Method: GET }

  TelegramWebhookFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        EntryPoints: [src/handlers/telegramWebhook.ts]
    Properties:
      Handler: src/handlers/telegramWebhook.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref JobsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref BotStateTable }
      Events:
        Post:
          Type: HttpApi
          Properties: { Path: /telegram/webhook, Method: POST }

Outputs:
  ApiUrl:
    Description: Base URL of the HTTP API.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TelegramWebhookUrl:
    Description: Set this as the bot webhook (see README).
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/telegram/webhook"
